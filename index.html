<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bedtime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: none;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #start-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #0f1529 0%, #070a14 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 1.5s ease-out;
    }
    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #start-overlay h1 {
      font-family: 'Georgia', serif;
      color: #c8d0e8;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }
    #start-overlay p {
      font-family: 'Georgia', serif;
      color: #7880a0;
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      animation: pulse 3s ease-in-out infinite;
    }

    /* Scene picker */
    #scene-picker {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #0f1529 0%, #070a14 100%);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 90;
      transition: opacity 1.5s ease-out;
    }
    #scene-picker.visible {
      display: flex;
    }
    #scene-picker.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #scene-picker h2 {
      font-family: 'Georgia', serif;
      color: #c8d0e8;
      font-size: clamp(1.4rem, 4vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }
    .scene-options {
      display: flex;
      gap: clamp(1rem, 4vw, 2.5rem);
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1rem;
    }
    .scene-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.2rem;
      padding: clamp(1.2rem, 3vw, 2rem) clamp(1.5rem, 4vw, 2.5rem);
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
      text-align: center;
      min-width: clamp(7rem, 22vw, 11rem);
    }
    .scene-btn:hover, .scene-btn:active {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }
    .scene-btn .icon {
      font-size: clamp(2.5rem, 7vw, 4rem);
      display: block;
      margin-bottom: 0.6rem;
    }
    .scene-btn .label {
      font-family: 'Georgia', serif;
      color: #a0a8c8;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body>
  <div id="start-overlay">
    <h1>Bedtime</h1>
    <p>tap anywhere to begin</p>
  </div>
  <div id="scene-picker">
    <h2>choose a scene</h2>
    <div class="scene-options">
      <div class="scene-btn" data-scene="bedtime">
        <span class="icon">&#127769;</span>
        <span class="label">Bedtime</span>
      </div>
      <div class="scene-btn" data-scene="beach">
        <span class="icon">&#127754;</span>
        <span class="label">Beach</span>
      </div>
      <div class="scene-btn" data-scene="hills">
        <span class="icon">&#127793;</span>
        <span class="label">Hills</span>
      </div>
    </div>
  </div>
  <canvas id="sky"></canvas>
  <script src="app.js"></script>
</body>
</html>
